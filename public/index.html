<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>留言墙 - Guestbook</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #8B4513;
      --secondary: #D2691E;
      --background: #FFF8DC;
      --card-bg: #FFFAF0;
      --text-primary: #3E2723;
      --text-secondary: #6D4C41;
      --accent: #FF6B35;
      --like-color: #E53935;
      --border: #DEB887;
      --shadow: rgba(139, 69, 19, 0.15);
      --shadow-hover: rgba(139, 69, 19, 0.25);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans SC', sans-serif;
      background-color: var(--background);
      color: var(--text-primary);
      min-height: 100vh;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(139, 69, 19, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(210, 105, 30, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    header {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      padding: 2rem;
      text-align: center;
      color: white;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: 0.5;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      position: relative;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    }

    header p {
      font-size: 1rem;
      opacity: 0.9;
      position: relative;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem;
    }

    .main-content {
      display: grid;
      grid-template-columns: 300px 380px 1fr 260px;
      gap: 1rem;
      align-items: start;
    }

    /* 日历样式 */
    .calendar-sidebar {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 4px 15px var(--shadow);
      border: 1px solid var(--border);
    }

    .calendar-sidebar h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      color: var(--primary);
      margin-bottom: 1rem;
      text-align: center;
    }

    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .calendar-header button {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--primary);
    }

    .calendar-header span {
      font-weight: 600;
      color: var(--text-primary);
    }

    .calendar-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .calendar-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      text-align: center;
    }

    .calendar-day {
      padding: 0.4rem 0;
      font-size: 0.85rem;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
    }

    .calendar-day:hover {
      background: rgba(139, 69, 19, 0.1);
    }

    .calendar-day.other-month {
      color: #ccc;
    }

    .calendar-day.today {
      background: var(--primary);
      color: white;
    }

    .calendar-day.has-event::after {
      content: '';
      position: absolute;
      bottom: 2px;
      left: 50%;
      transform: translateX(-50%);
      width: 5px;
      height: 5px;
      background: var(--accent);
      border-radius: 50%;
    }

    .calendar-day.selected {
      background: var(--secondary);
      color: white;
    }

    /* 倒数日 */
    .countdown-section {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .countdown-section h4 {
      font-size: 0.95rem;
      color: var(--primary);
      margin-bottom: 0.75rem;
    }

    .event-item {
      background: rgba(255,255,255,0.5);
      padding: 0.5rem;
      border-radius: 8px;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
    }

    .event-item .event-title {
      font-weight: 600;
      color: var(--text-primary);
    }

    .event-item .event-date {
      color: var(--text-secondary);
      font-size: 0.75rem;
    }

    .event-item .event-countdown {
      color: var(--accent);
      font-weight: 600;
      font-size: 0.85rem;
    }

    .event-item .delete-event {
      color: var(--like-color);
      cursor: pointer;
      font-size: 0.7rem;
      float: right;
    }

    /* 添加事件弹窗 */
    .add-event-form {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }

    .add-event-form input, .add-event-form select {
      width: 100%;
      padding: 0.4rem;
      margin-bottom: 0.5rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.85rem;
    }

    .add-event-form button {
      width: 100%;
      padding: 0.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .form-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: 0 4px 15px var(--shadow);
      border: 1px solid var(--border);
      position: sticky;
      top: 2rem;
    }

    .form-card h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .form-card h2::before {
      content: '✍️';
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-secondary);
      font-weight: 500;
      font-size: 0.9rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      color: var(--text-primary);
      background: white;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--secondary);
      box-shadow: 0 0 0 3px rgba(210, 105, 30, 0.15);
    }

    .form-group textarea {
      min-height: 120px;
      resize: vertical;
    }

    .form-group .char-count {
      text-align: right;
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .author-checkbox {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: rgba(139, 69, 19, 0.08);
      border-radius: 8px;
      border: 1px solid var(--border);
    }

    .author-checkbox input {
      width: auto;
      margin: 0;
    }

    .author-checkbox label {
      margin: 0;
      cursor: pointer;
      color: var(--primary);
      font-weight: 500;
    }

    .author-tip {
      font-size: 0.75rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }

    .image-upload {
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(255,255,255,0.5);
    }

    .image-upload:hover {
      border-color: var(--secondary);
      background: rgba(210, 105, 30, 0.05);
    }

    .image-upload.has-image {
      padding: 0.5rem;
    }

    .image-upload input[type="file"] {
      display: none;
    }

    .image-upload .upload-icon {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .image-upload .upload-text {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .image-upload .upload-hint {
      color: var(--text-secondary);
      font-size: 0.75rem;
      margin-top: 0.25rem;
    }

    .image-preview {
      max-width: 100%;
      max-height: 200px;
      border-radius: 8px;
      display: none;
    }

    .image-preview.visible {
      display: block;
    }

    .remove-image {
      display: none;
      margin-top: 0.5rem;
      color: var(--like-color);
      cursor: pointer;
      font-size: 0.85rem;
    }

    .remove-image.visible {
      display: block;
    }

    .submit-btn {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
      margin-top: 0.5rem;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(139, 69, 19, 0.3);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .messages-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .messages-section h2::before {
      content: '💬';
    }

    .messages-count {
      font-family: 'Noto Sans SC', sans-serif;
      font-size: 0.9rem;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .message-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 15px var(--shadow);
      border: 1px solid var(--border);
      transition: transform 0.3s, box-shadow 0.3s;
      animation: slideIn 0.4s ease;
      position: relative;
    }

    .hidden-message {
      display: none;
    }

    .show-more-btn {
      display: block;
      width: 100%;
      padding: 0.8rem;
      background: rgba(139, 69, 19, 0.1);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--primary);
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .show-more-btn:hover {
      background: rgba(139, 69, 19, 0.2);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 25px var(--shadow-hover);
    }

    .message-card.is-author {
      border-color: var(--accent);
      box-shadow: 0 4px 15px rgba(255, 107, 53, 0.15);
    }

    .message-card.is-author::before {
      content: '⭐ 作者';
      position: absolute;
      top: -10px;
      right: 20px;
      background: var(--accent);
      color: white;
      padding: 0.25rem 0.75rem;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .message-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .message-author {
      font-weight: 600;
      color: var(--primary);
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .message-author::before {
      content: '👤';
      font-size: 1rem;
    }

    .message-time {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .author-actions {
      display: none;
      gap: 0.5rem;
      margin-left: auto;
    }

    .author-actions.visible {
      display: flex;
    }

    .author-actions button {
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }

    .author-actions button:hover {
      background: var(--primary);
      color: white;
      border-color: var(--primary);
    }

    .author-actions .delete-btn:hover {
      background: var(--like-color);
      border-color: var(--like-color);
    }

    .message-content {
      color: var(--text-primary);
      line-height: 1.8;
      margin-bottom: 1rem;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .message-image {
      max-width: 100%;
      max-height: 300px;
      border-radius: 8px;
      margin-bottom: 1rem;
      display: block;
    }

    .gifts-display {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 1rem;
      padding: 0.75rem;
      background: rgba(255, 107, 53, 0.1);
      border-radius: 8px;
    }

    .gift-item {
      display: flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem 0.5rem;
      background: white;
      border-radius: 12px;
      font-size: 0.85rem;
    }

    .gift-item .gift-emoji {
      font-size: 1rem;
    }

    .message-actions {
      display: flex;
      gap: 0.5rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
      flex-wrap: nowrap;
      justify-content: flex-start;
    }

    .action-btn {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.8rem;
      border: none;
      border-radius: 20px;
      background: rgba(139, 69, 19, 0.1);
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.3s;
      font-size: 0.85rem;
      white-space: nowrap;
    }

    .action-btn:hover {
      background: rgba(139, 69, 19, 0.2);
      transform: scale(1.05);
    }

    .action-btn.liked {
      background: rgba(229, 57, 53, 0.15);
      color: var(--like-color);
    }

    .action-btn.comment-btn::before { content: '💭'; }
    .action-btn.like-btn::before { content: '❤️'; }
    .action-btn.gift-btn::before { content: '🎁'; }

    .comments-section {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed var(--border);
      display: none;
    }

    .comments-section.visible {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; max-height: 0; }
      to { opacity: 1; max-height: 1000px; }
    }

    .comment-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .comment-form input {
      flex: 1;
      min-width: 120px;
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .comment-form input:focus {
      outline: none;
      border-color: var(--secondary);
    }

    .comment-form button {
      padding: 0.5rem 1rem;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.3s;
    }

    .comment-form button:hover {
      background: var(--primary);
    }

    .comment-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .comment-item {
      background: rgba(255,255,255,0.5);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .comment-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.25rem;
    }

    .comment-author {
      font-weight: 600;
      color: var(--secondary);
      font-size: 0.85rem;
    }

    .comment-time {
      font-size: 0.75rem;
      color: var(--text-secondary);
    }

    .comment-delete-btn {
      margin-left: auto;
      padding: 0.1rem 0.4rem;
      font-size: 0.7rem;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: white;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }

    .comment-delete-btn:hover {
      background: var(--like-color);
      color: white;
      border-color: var(--like-color);
    }

    /* 新板块样式 */
    .section-divider {
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
      margin: 2rem 0;
    }

    .messages-section h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      color: var(--primary);
      margin-bottom: 1.25rem;
    }

    .add-item-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .add-item-form input {
      padding: 0.5rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
    }

    .add-item-form .item-username { width: 100px; }
    .add-item-form .item-content { flex: 1; min-width: 150px; }
    .add-item-form .item-date { width: 140px; }

    .add-item-form .submit-btn {
      padding: 0.5rem 1rem;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .items-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .item-card {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      box-shadow: 0 2px 8px var(--shadow);
      border: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item-card:hover {
      box-shadow: 0 4px 12px var(--shadow-hover);
    }

    .item-info {
      flex: 1;
    }

    .item-content-text {
      font-size: 1.05rem;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
    }

    .item-meta {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .item-actions {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .want-btn, .support-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: white;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .want-btn:hover, .support-btn:hover {
      background: var(--secondary);
      color: white;
      border-color: var(--secondary);
    }

    .want-count, .support-count {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    .delete-item-btn {
      padding: 0.25rem 0.5rem;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.8rem;
    }

    .delete-item-btn:hover {
      color: var(--like-color);
    }

    /* 折叠内容 */
    .item-content-collapsed {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .expand-btn {
      color: var(--secondary);
      cursor: pointer;
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }

    .expand-btn:hover {
      text-decoration: underline;
    }

    /* 小板块评论 */
    .item-comments {
      margin-top: 0.75rem;
      padding-top: 0.75rem;
      border-top: 1px dashed var(--border);
    }

    .item-comment-form {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }

    .item-comment-form input {
      flex: 1;
      padding: 0.4rem 0.6rem;
      border: 1px solid var(--border);
      border-radius: 15px;
      font-size: 0.8rem;
    }

    .item-comment-form button {
      padding: 0.4rem 0.8rem;
      background: var(--secondary);
      color: white;
      border: none;
      border-radius: 15px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .item-comment-list {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .item-comment {
      background: rgba(255,255,255,0.5);
      padding: 0.4rem 0.6rem;
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .item-comment-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }

    .item-comment-author {
      font-weight: 600;
      color: var(--secondary);
      font-size: 0.75rem;
    }

    .item-comment-time {
      font-size: 0.7rem;
      color: var(--text-secondary);
    }

    .comment-toggle-btn {
      color: var(--text-secondary);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .comment-toggle-btn:hover {
      color: var(--secondary);
    }

    /* 照片墙 */
    .photo-wall {
      position: sticky;
      top: 2rem;
    }

    .photo-wall h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--primary);
      margin-bottom: 1rem;
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 0.5rem;
      max-height: 600px;
      overflow-y: auto;
    }

    .photo-item {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
    }

    .photo-item img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
    }

    .photo-note {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 0.25rem;
      font-size: 0.65rem;
      display: none;
    }

    .photo-item:hover .photo-note {
      display: block;
    }

    .photo-delete-btn {
      background: #E53935;
      color: white;
      border: none;
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.6rem;
      cursor: pointer;
      margin-top: 0.25rem;
    }

    .comment-content {
      color: var(--text-primary);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }

    .empty-state .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .empty-state p {
      font-size: 1.1rem;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-secondary);
      font-size: 0.85rem;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
    }

    @media (max-width: 1100px) {
      .main-content { grid-template-columns: 1fr 1fr; }
      .photo-wall { display: none; }
    }

    @media (max-width: 768px) {
      .main-content { grid-template-columns: 1fr; }
      .form-card { position: static; }
      header h1 { font-size: 1.8rem; }
      .container { padding: 1rem; }
      .message-card { padding: 1rem; }
    }

    .loading {
      text-align: center;
      padding: 2rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--primary);
      color: white;
      padding: 1rem 2rem;
      border-radius: 8px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      opacity: 0;
      transition: all 0.3s;
      z-index: 1000;
    }

    .toast.visible { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.error { background: var(--like-color); }

    /* Gift Modal */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .modal-overlay.visible { display: flex; }

    .modal {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.5rem;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .modal h3 {
      font-family: 'Playfair Display', serif;
      color: var(--primary);
      margin-bottom: 1rem;
      text-align: center;
    }

    .gift-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .gift-option {
      padding: 0.75rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      background: white;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .gift-option:hover {
      border-color: var(--secondary);
    }

    .gift-option.selected {
      border-color: var(--accent);
      background: rgba(255, 107, 53, 0.1);
    }

    .gift-option .emoji {
      font-size: 2rem;
      display: block;
    }

    .gift-option .name {
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
    }

    .modal-buttons button {
      flex: 1;
      padding: 0.75rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .modal-buttons .cancel-btn {
      background: #ddd;
      color: var(--text-primary);
    }

    .modal-buttons .send-btn {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
    }

    /* Edit Modal */
    .edit-textarea {
      width: 100%;
      min-height: 150px;
      padding: 0.75rem;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 1rem;
      resize: vertical;
      margin-bottom: 1rem;
    }

    .edit-textarea:focus {
      outline: none;
      border-color: var(--secondary);
    }
  </style>
</head>
<body>
  <header>
    <h1>留言墙</h1>
    <p>留下你的足迹，分享你的想法</p>
  </header>

  <div class="container">
    <div class="main-content">
      <!-- 日历侧边栏 -->
      <div class="calendar-sidebar">
        <h3>📅 日历 & 倒数日</h3>
        <div class="calendar-header">

        <!-- 添加事件表单 -->
        <div class="add-event-form" id="addEventForm" style="display: none;">
          <input type="text" id="eventTitle" placeholder="事件名称" maxlength="50">
          <input type="text" id="eventNote" placeholder="备注（可选）" maxlength="100">
          <select id="eventRepeat">

        <!-- 倒数日列表 -->

      <div class="form-card">
        <h2>我要留言</h2>
        <form id="messageForm">
          <div class="form-group">
            <label for="username">昵称</label>

          <div class="form-group">
            <label for="content">留言内容</label>
            <textarea id="content" placeholder="写下你想说的话..." maxlength="1000" required></textarea>
            <div class="char-count"><span id="charCount">0</span>/1000</div>

      <div class="messages-section">
        <h2>全部留言 <span class="messages-count">(<span id="totalCount">0</span>条)</span></h2>
        <div id="messagesList">
          <div class="loading"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- 照片墙 -->
      <div class="photo-wall">
        <h2>📷 照片墙</h2>
        <div class="photo-grid" id="photoGrid">
          <p style="color: var(--text-secondary); font-size: 0.85rem;">暂无照片</p>
        </div>
      </div>
    </div>

    <!-- 想吃的东西 -->
    <div class="section-divider"></div>
    <div class="messages-section" id="foodsSection">
      <h2>🍜 想吃的东西</h2>
      <div class="add-item-form">
        <input type="text" class="item-username" id="foodUsername" placeholder="昵称">
        <input type="text" class="item-content" id="foodContent" placeholder="想吃的东西">
        <input type="text" class="item-date" id="foodDate" placeholder="什么时间吃">
        <button class="submit-btn" onclick="addFood()">添加</button>

      <div class="items-list" id="foodsList"></div>

    <!-- 想去的旅游地方 -->
    <div class="section-divider"></div>
    <div class="messages-section" id="travelsSection">
      <h2>✈️ 想去的旅游地方</h2>
      <div class="add-item-form">
        <input type="text" class="item-username" id="travelUsername" placeholder="昵称">
        <input type="text" class="item-content" id="travelContent" placeholder="想去的地方">
        <input type="text" class="item-date" id="travelDate" placeholder="什么时间玩">

    <!-- 未来的小目标 -->
    <div class="section-divider"></div>
    <div class="messages-section" id="goalsSection">
      <h2>🎯 未来的小目标</h2>
      <div class="add-item-form">
        <input type="text" class="item-username" id="goalUsername" placeholder="昵称">
        <input type="text" class="item-content" id="goalContent" placeholder="小目标">
        <input type="text" class="item-date" id="goalDate" placeholder="什么时间实现">

  <footer>

  <div class="toast" id="toast"></div>

  <!-- 送礼物弹窗 -->
  <div class="modal-overlay" id="giftModal">
    <div class="modal">
      <h3>🎁 送礼物</h3>
      <input type="hidden" id="giftMessageId">
      <div class="form-group">
        <input type="text" id="giftSender" placeholder="你的昵称" maxlength="50">
      </div>
      <div class="gift-options" id="giftOptions">
        <div class="gift-option" data-gift="玫瑰"><span class="emoji">🌹</span><span class="name">玫瑰</span></div>
        <div class="gift-option" data-gift="爱心"><span class="emoji">❤️</span><span class="name">爱心</span></div>
        <div class="gift-option" data-gift="星星"><span class="emoji">⭐</span><span class="name">星星</span></div>
        <div class="gift-option" data-gift="蛋糕"><span class="emoji">🎂</span><span class="name">蛋糕</span></div>
        <div class="gift-option" data-gift="钻石"><span class="emoji">💎</span><span class="name">钻石</span></div>
        <div class="gift-option" data-gift="红包"><span class="emoji">🧧</span><span class="name">红包</span></div>
      </div>
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeGiftModal()">取消</button>

  <!-- 编辑弹窗 -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>✏️ 编辑留言</h3>
      <input type="hidden" id="editMessageId">
      <textarea class="edit-textarea" id="editContent" maxlength="1000"></textarea>
      <div class="modal-buttons">
        <button class="cancel-btn" onclick="closeEditModal()">取消</button>
        <button class="send-btn" onclick="saveEdit()">保存</button>
      </div>
    </div>
  </div>

  <script>
    // ==================== 日历功能 ====================
    let currentDate = new Date();
    let selectedDate = null;
    let calendarEvents = [];

    function renderCalendar() {
      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date();

      document.getElementById('currentMonth').textContent = `${year}年${month + 1}月`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const daysInPrevMonth = new Date(year, month, 0).getDate();

      const calendarDays = document.getElementById('calendarDays');
      calendarDays.innerHTML = '';

      // 获取有事件的日期
      const eventDates = calendarEvents.map(e => {
        const repeat = e.repeat_type === '每年' ? 'yearly' : e.repeat_type === '每月' ? 'monthly' : 'none';
        const eventDate = new Date(e.event_date);
        if (repeat === 'yearly') {
          return `${month + 1}-${eventDate.getDate()}`;
        } else if (repeat === 'monthly') {
          return `${eventDate.getDate()}`;
        }
        return `${year}-${month + 1}-${eventDate.getDate()}`;
      }).filter(d => d !== null);

      // 上个月的天数
      for (let i = firstDay - 1; i >= 0; i--) {
        const day = document.createElement('div');
        day.className = 'calendar-day other-month';
        day.textContent = daysInPrevMonth - i;
        calendarDays.appendChild(day);
      }

      // 当月天数
      for (let i = 1; i <= daysInMonth; i++) {
        const day = document.createElement('div');
        day.className = 'calendar-day';
        day.textContent = i;

        const isToday = year === today.getFullYear() && month === today.getMonth() && i === today.getDate();
        if (isToday) day.classList.add('today');

        // 检查是否有事件
        const dateKey1 = `${year}-${month + 1}-${i}`;
        const dateKey2 = `${month + 1}-${i}`;
        const dateKey3 = `${i}`;
        if (eventDates.includes(dateKey1) || eventDates.includes(dateKey2) || eventDates.includes(dateKey3)) {
          day.classList.add('has-event');
        }

        // 点击日期选择
        day.onclick = (e) => selectDate(year, month, i, e.target);

        calendarDays.appendChild(day);
      }

      // 下个月的天数
      const remainingDays = 42 - (firstDay + daysInMonth);
      for (let i = 1; i <= remainingDays; i++) {
        const day = document.createElement('div');
        day.className = 'calendar-day other-month';
        day.textContent = i;
        day.onclick = (e) => selectDate(year, month + 1, i, e.target);
        calendarDays.appendChild(day);
      }
    }

    function selectDate(year, month, day, element) {
      selectedDate = new Date(year, month, day);
      document.querySelectorAll('.calendar-day').forEach(d => d.classList.remove('selected'));
      if (element) element.classList.add('selected');
      document.getElementById('addEventForm').style.display = 'block';
    }

    function closeEventForm() {
      document.getElementById('addEventForm').style.display = 'none';
      document.getElementById('eventTitle').value = '';
      document.getElementById('eventNote').value = '';
      selectedDate = null;
    }

    async function addCalendarEvent() {
      const title = document.getElementById('eventTitle').value.trim();
      const note = document.getElementById('eventNote').value.trim();
      const repeat = document.getElementById('eventRepeat').value;

      if (!title) {
        showToast('请填写事件名称', true);
        return;
      }

      if (!selectedDate) {
        showToast('请在日历上选择日期', true);
        return;
      }

      const dateStr = selectedDate.toISOString().split('T')[0];

      try {
        const res = await fetch('/api/calendar/events', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: savedUsername || '匿名',
            event_date: dateStr,
            title,
            note,
            calendar_type: '公历',
            repeat_type: repeat
          })
        });

        if (res.ok) {
          showToast('事件添加成功');
          closeEventForm();
          loadCalendarEvents();
          renderCalendar();
        } else {
          showToast('添加失败', true);
        }
      } catch (err) {
        showToast('添加失败: ' + err.message, true);
      }
    }

    async function loadCalendarEvents() {
      try {
        const res = await fetch('/api/calendar/events');
        calendarEvents = await res.json();
        renderCountdown();
        renderCalendar();
      } catch (err) {
        console.error('加载事件失败:', err);
      }
    }

    let countdownExpanded = false;
    function renderCountdown() {
      const list = document.getElementById('countdownList');
      if (calendarEvents.length === 0) {
        list.innerHTML = '<p style="color: var(--text-secondary); font-size: 0.8rem;">暂无倒数日</p>';
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const MAX_VISIBLE = 5;
      let visibleCount = 0;
      let html = '';
      calendarEvents.forEach((event, idx) => {
        const repeat = event.repeat_type === '每年' ? 'yearly' : event.repeat_type === '每月' ? 'monthly' : 'none';

        let eventDate = new Date(event.event_date);
        const year = today.getFullYear();
        const month = today.getMonth();
        const day = today.getDate();

        if (repeat === 'yearly') {
          eventDate = new Date(year, eventDate.getMonth(), eventDate.getDate());
          if (eventDate < today) {
            eventDate = new Date(year + 1, eventDate.getMonth(), eventDate.getDate());
          }
        } else if (repeat === 'monthly') {
          eventDate = new Date(year, month, eventDate.getDate());
          if (eventDate < today) {
            eventDate = new Date(year, month + 1, eventDate.getDate());
          }
        } else {
          if (eventDate < today) {
            return; // 跳过已过去的日期
          }
        }

        const diff = Math.ceil((eventDate - today) / (1000 * 60 * 60 * 24));
        const isPast = diff <= 0;
        const isHidden = !countdownExpanded && visibleCount >= MAX_VISIBLE;
        visibleCount++;

        html += `
          <div class="event-item" style="display: ${isHidden ? 'none' : 'block'}">
            <div class="event-title">${event.title}</div>
            <div class="event-date">${event.event_date} ${repeat === 'yearly' ? '每年' : repeat === 'monthly' ? '每月' : ''}</div>
            <div class="event-countdown">${isPast ? '已到期' : diff + '天后'}</div>
            <span class="delete-event" onclick="deleteEvent(${event.id})">删除</span>
          </div>
        `;
      });

      const totalVisible = html.split('display: none').length - 1;
      const totalCount = calendarEvents.filter(e => {
        const repeat = e.repeat_type === '每年' ? 'yearly' : e.repeat_type === '每月' ? 'monthly' : 'none';
        let d = new Date(e.event_date);
        if (repeat === 'yearly') d = new Date(today.getFullYear(), d.getMonth(), d.getDate());
        return d >= today || repeat === 'yearly' || repeat === 'monthly';
      }).length;

      if (totalCount > MAX_VISIBLE) {
        html += `<button class="show-more-btn" onclick="toggleCountdown()" style="padding: 0.4rem; font-size: 0.8rem;">${countdownExpanded ? '收起' : `展开全部 ${totalCount} 个`}</button>`;
      }

      list.innerHTML = html || '<p style="color: var(--text-secondary); font-size: 0.8rem;">暂无倒数日</p>';
    }

    function toggleCountdown() {
      countdownExpanded = !countdownExpanded;
      renderCountdown();
    }

    async function deleteEvent(id) {
      if (!confirm('确定删除这个事件吗?')) return;

      try {
        const res = await fetch(`/api/calendar/events/${id}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: savedUsername || '' })
        });
        if (res.ok) {
          showToast('删除成功');
          loadCalendarEvents();
        } else {
          const data = await res.json();
          showToast(data.error || '删除失败', true);
        }
      } catch (err) {
        showToast('删除失败', true);
      }
    }

    document.getElementById('prevMonth').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() - 1);
      renderCalendar();
    };

    document.getElementById('nextMonth').onclick = () => {
      currentDate.setMonth(currentDate.getMonth() + 1);
      renderCalendar();
    };

    // ==================== 主应用 ====================
    const messageForm = document.getElementById('messageForm');
    const usernameInput = document.getElementById('username');
    const contentInput = document.getElementById('content');
    const charCount = document.getElementById('charCount');
    const imageInput = document.getElementById('imageInput');
    const imageUpload = document.getElementById('imageUpload');
    const imagePreview = document.getElementById('imagePreview');
    const removeImageBtn = document.getElementById('removeImage');
    const messagesList = document.getElementById('messagesList');
    const totalCount = document.getElementById('totalCount');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');
    const giftModal = document.getElementById('giftModal');
    const editModal = document.getElementById('editModal');

    let selectedImage = null;
    let likedMessages = JSON.parse(localStorage.getItem('likedMessages') || '[]');
    let authorKeys = JSON.parse(localStorage.getItem('authorKeys') || '{}');
    let selectedGift = null;
    let savedUsername = localStorage.getItem('username') || '';

    // 页面加载时填充昵称
    if (savedUsername) {
      usernameInput.value = savedUsername;
      document.getElementById('foodUsername').value = savedUsername;
      document.getElementById('travelUsername').value = savedUsername;
      document.getElementById('goalUsername').value = savedUsername;
    }

    // 保存昵称
    function saveUsername(name) {
      localStorage.setItem('username', name);
    }

    // 保存作者密钥
    function saveAuthorKey(messageId, key) {

    function formatTime(dateString) {
      const date = new Date(dateString);
      const now = new Date();
      const diff = now - date;
      if (diff < 60000) return '刚刚';
      if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
      if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
      if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';
      return date.toLocaleDateString('zh-CN', { year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

      if (!file) return;
      if (file.size > 5 * 1024 * 1024) return showToast('图片大小不能超过 5MB', true);
      const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
      if (!validTypes.includes(file.type)) return showToast('只支持 JPG, PNG, GIF, WebP 格式', true);
      try {
        const base64 = await compressImage(file);
        selectedImage = base64;
        imagePreview.src = base64;

        imageUpload.classList.add('has-image');

    });

    function compressImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width, height = img.height;
            const maxSize = 800;
            if (width > maxSize || height > maxSize) {
              if (width > height) { height = (height / width) * maxSize; width = maxSize; }
              else { width = (width / height) * maxSize; height = maxSize; }
            }
            canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL('image/jpeg', 0.7));
          };
          img.onerror = reject; img.src = e.target.result;
        };
        reader.onerror = reject; reader.readAsDataURL(file);
      });
    }

    async function likeMessage(btn) {

      const isLiked = likedMessages.includes(parseInt(id));
      try {
        if (isLiked) {
          // 取消点赞
          const response = await fetch(`/api/messages/${id}/like`, { method: 'DELETE' });
          const result = await response.json();
          btn.classList.remove('liked');
          btn.querySelector('.like-count').textContent = result.likes;
          likedMessages = likedMessages.filter(x => x !== parseInt(id));
          localStorage.setItem('likedMessages', JSON.stringify(likedMessages));
        } else {
          // 点赞
          const response = await fetch(`/api/messages/${id}/like`, { method: 'POST' });
          const result = await response.json();
          btn.classList.add('liked');
          btn.querySelector('.like-count').textContent = result.likes;
          likedMessages.push(parseInt(id));
          localStorage.setItem('likedMessages', JSON.stringify(likedMessages));
        }

        });

        showToast('评论已删除');
        // 找到对应的留言ID并刷新评论
        const commentItem = document.querySelector(`.comment-item[data-comment-id="${commentId}"]`);
        if (commentItem) {
          const messageCard = commentItem.closest('.message-card');
          if (messageCard) {
            const messageId = messageCard.dataset.id;
            loadComments(messageId);
            // 更新评论数
            const commentBtn = document.querySelector(`.comment-btn[data-id="${messageId}"]`);
            const count = parseInt(commentBtn.querySelector('.comment-count').textContent);
            commentBtn.querySelector('.comment-count').textContent = count - 1;

                  <button onclick="addTravelComment(${t.id})">发送</button>
                </div>
                <div class="item-comment-list" id="travel-comment-list-${t.id}"></div>
              </div>
            </div>
          `;
        }).join('');
      } catch(e) { console.error(e); }
    }

    async function addTravel() {
      const username = document.getElementById('travelUsername').value.trim() || savedUsername;
      const content = document.getElementById('travelContent').value.trim();
      const item_date = document.getElementById('travelDate').value;
      if (!username || !content) return showToast('请填写完整', true);
      if (savedUsername && !document.getElementById('travelUsername').value.trim()) {
        saveUsername(username);
      }
      await fetch('/api/travels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, content, item_date })
      });
      document.getElementById('travelContent').value = '';
      document.getElementById('travelDate').value = '';
      loadTravels();
    }

    async function wantTravel(id) {
      if (!savedUsername) return showToast('请先设置昵称', true);
      await fetch(`/api/travels/${id}/want`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },

    async function deleteTravel(id) {

        headers: { 'Content-Type': 'application/json' },

    function toggleTravelContent(id) {
      const el = document.getElementById(`travel-content-${id}`);
      const btn = el.nextElementSibling;
      if (el.classList.contains('item-content-collapsed')) {
        el.classList.remove('item-content-collapsed');
        btn.textContent = '收起';
      } else {
        el.classList.add('item-content-collapsed');
        btn.textContent = '展开';
      }
    }

    async function toggleTravelComments(id) {
      const el = document.getElementById(`travel-comments-${id}`);
      el.style.display = el.style.display === 'none' ? 'block' : 'none';
      if (el.style.display === 'block') {
        loadTravelComments(id);
      }
    }

    async function loadTravelComments(id) {
      const res = await fetch(`/api/travels/${id}/comments`);
      const comments = await res.json();
      const list = document.getElementById(`travel-comment-list-${id}`);
      if (comments.length === 0) {
        list.innerHTML = '<p style="font-size:0.75rem;color:var(--text-secondary)">暂无评论</p>';
        return;
      }
      list.innerHTML = comments.map(c => `
        <div class="item-comment">
          <div class="item-comment-header">
            <span class="item-comment-author">${escapeHtml(c.username)}</span>
            <span class="item-comment-time">${formatTime(c.created_at)}</span>
            ${savedUsername && c.username === savedUsername ? `<button class="comment-delete-btn" onclick="deleteTravelComment(${id}, ${c.id})">删除</button>` : ''}
          </div>
          <div>${escapeHtml(c.content)}</div>
        </div>
      `).join('');
    }

    async function addTravelComment(id) {
      const username = document.getElementById(`travel-comment-user-${id}`).value.trim() || savedUsername;
      const content = document.getElementById(`travel-comment-content-${id}`).value.trim();
      if (!username || !content) return showToast('请填写完整', true);
      await fetch(`/api/travels/${id}/comments`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, content })
      });
      if (savedUsername && !document.getElementById(`travel-comment-user-${id}`).value.trim()) {
        saveUsername(username);
      }
      document.getElementById(`travel-comment-content-${id}`).value = '';
      loadTravelComments(id);
    }

    async function deleteTravelComment(travelId, commentId) {
      if (!confirm('确定删除？')) return;
      if (!savedUsername) return showToast('请先设置昵称', true);
      await fetch(`/api/travels/${travelId}/comments/${commentId}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: savedUsername })
      });
      loadTravelComments(travelId);
    }

    // 未来的小目标
    async function loadGoals() {
      try {
        const res = await fetch('/api/goals');
        const goals = await res.json();
        const list = document.getElementById('goalsList');
        if (goals.length === 0) {
          list.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">还没有添加~</p>';
          return;
        }
        list.innerHTML = goals.map(g => {
          let supported = [];
          try { supported = g.supported ? JSON.parse(g.supported) : []; } catch(e) { supported = []; }
          const isAuthor = savedUsername && g.username === savedUsername;
          const isLong = g.content.length > 50;
          return `
            <div class="item-card">
              <div class="item-info">
                <div class="item-content-text ${isLong ? 'item-content-collapsed' : ''}" id="goal-content-${g.id}">${escapeHtml(g.content)}</div>
                ${isLong ? `<span class="expand-btn" onclick="toggleGoalContent(${g.id})">展开</span>` : ''}
                <div class="item-meta">${escapeHtml(g.username)} ${g.item_date ? '· ' + g.item_date : ''}</div>
              </div>
              <div class="item-actions">
                <button class="support-btn" onclick="supportGoal(${g.id})">一定会成功的</button>
                <span class="support-count">${supported.length}</span>
                <span class="comment-toggle-btn" onclick="toggleGoalComments(${g.id})">评论</span>
                ${isAuthor ? `<button class="delete-item-btn" onclick="deleteGoal(${g.id})">删除</button>` : ''}
              </div>
              <div class="item-comments" id="goal-comments-${g.id}" style="display:none;">
                <div class="item-comment-form">
                  <input type="text" placeholder="昵称" id="goal-comment-user-${g.id}">
                  <input type="text" placeholder="评论" id="goal-comment-content-${g.id}">
                  <button onclick="addGoalComment(${g.id})">发送</button>
                </div>
                <div class="item-comment-list" id="goal-comment-list-${g.id}"></div>
              </div>
            </div>
          `;
        }).join('');
      } catch(e) { console.error(e); }
    }

    function toggleGoalContent(id) {
      const el = document.getElementById(`goal-content-${id}`);
      const btn = el.nextElementSibling;
      if (el.classList.contains('item-content-collapsed')) {
        el.classList.remove('item-content-collapsed');
        btn.textContent = '收起';
      } else {
        el.classList.add('item-content-collapsed');
        btn.textContent = '展开';
      }
    }

    async function toggleGoalComments(id) {
      const el = document.getElementById(`goal-comments-${id}`);

      const res = await fetch(`/api/goals/${id}/comments`);

        <div class="item-comment">
          <div class="item-comment-header">
            <span class="item-comment-author">${escapeHtml(c.username)}</span>
            <span class="item-comment-time">${formatTime(c.created_at)}</span>
            ${savedUsername && c.username === savedUsername ? `<button class="comment-delete-btn" onclick="deleteGoalComment(${id}, ${c.id})">删除</button>` : ''}
          </div>
          <div>${escapeHtml(c.content)}</div>
        </div>
      `).join('');
    }

    async function addGoalComment(id) {
      const username = document.getElementById(`goal-comment-user-${id}`).value.trim() || savedUsername;
      const content = document.getElementById(`goal-comment-content-${id}`).value.trim();
      if (!username || !content) return showToast('请填写完整', true);
      await fetch(`/api/goals/${id}/comments`, {

        headers: { 'Content-Type': 'application/json' },

      if (savedUsername && !document.getElementById(`goal-comment-user-${id}`).value.trim()) {
        saveUsername(username);
      }
      document.getElementById(`goal-comment-content-${id}`).value = '';
      loadGoalComments(id);
    }

    async function deleteGoalComment(goalId, commentId) {
      if (!confirm('确定删除？')) return;
      if (!savedUsername) return showToast('请先设置昵称', true);
      await fetch(`/api/goals/${goalId}/comments/${commentId}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },

    async function addGoal() {
      const username = document.getElementById('goalUsername').value.trim() || savedUsername;
      const content = document.getElementById('goalContent').value.trim();
      const item_date = document.getElementById('goalDate').value;
      if (!username || !content) return showToast('请填写完整', true);

    async function supportGoal(id) {
      if (!savedUsername) return showToast('请先设置昵称', true);
      await fetch(`/api/goals/${id}/support`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },

      });

    async function deleteGoal(id) {
      if (!confirm('确定删除？')) return;
      if (!savedUsername) return showToast('请先设置昵称', true);
      await fetch(`/api/goals/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: savedUsername })
      });
      loadGoals();
    }

    // 初始化时加载各板块
    loadFoods();
    loadTravels();
    loadGoals();
    loadPhotos();
    loadCalendarEvents();

    loadMessages();

    // 照片墙
    async function loadPhotos() {
      try {
        const res = await fetch('/api/photos');
        const photos = await res.json();
        const grid = document.getElementById('photoGrid');
        if (photos.length === 0) {
          grid.innerHTML = '<p style="color: var(--text-secondary); font-size: 0.85rem;">暂无照片</p>';
          return;
        }
        grid.innerHTML = photos.map(p => `
          <div class="photo-item">
            <img src="${p.image}" alt="照片">
            <div class="photo-note">
              ${p.note ? escapeHtml(p.note.substring(0, 30)) + (p.note.length > 30 ? '...' : '') : ''}<br>
              ${p.username || ''} ${p.message_date || ''}
              ${savedUsername && p.username === savedUsername ? `<br><button class="photo-delete-btn" onclick="deletePhoto(${p.id})">删除</button>` : ''}
            </div>
          </div>
        `).join('');
      } catch(e) { console.error(e); }
    }

    async function deletePhoto(id) {
      if (!confirm('确定删除这张照片？')) return;
      if (!savedUsername) return showToast('请先设置昵称', true);
      await fetch(`/api/photos/${id}`, {
        method: 'DELETE',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: savedUsername })
      });
      loadPhotos();
    }
  </script>
